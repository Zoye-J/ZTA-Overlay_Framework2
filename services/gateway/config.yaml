service:
  name: "gateway"
  port: 5000
  bind_host: "127.0.0.1"  # LOCALHOST ONLY - critical for ZTA overlay
  
local:
  edge_router_proxy_host: "127.0.0.1"
  edge_router_proxy_port: 9999  # Port where Edge Router is listening
  
jwt:
  expiry_hours: 8
  refresh_expiry_days: 7
  algorithm: "HS256"
  
database:
  type: "sqlite"
  path: "../../database/gateway.db"
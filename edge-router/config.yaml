# This file is generated by the enrollment process
identity:
  name: "gateway-service-01"
  type: "service"
  cert_path: "../certs/identities/gateway/client.crt"
  key_path: "../certs/identities/gateway/client.key"
  ca_cert_path: "../certs/ca.crt"

controller:
  url: "https://controller.zta.bangladesh.gov.bd"
  host: "127.0.0.1"  # In production, this would be a real address
  port: 8080
  heartbeat_interval: 30

local:
  proxy_port: 9999  # Local port this router listens on
  default_service: "gateway"  # Where to forward traffic by default

# Which services this identity can bind (host)
bind_services:
  - "gateway"
  - "dashboard"

# Which services this identity can dial (access)
dial_services:
  - "api_server"
  - "opa_agent"